services:
  app:
    image: ${TODO_IMAGE:-ghcr.io/ahsaboy/todo:latest}
    container_name: todo-app
    environment:
      - TZ=Asia/Shanghai
      - HOST=0.0.0.0
      - PORT=${PORT:-8080}
      - CORS=${CORS:-}
    ports:
      - "${HOST:-0.0.0.0}:${PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-8080}/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
