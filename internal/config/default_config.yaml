# ==============================
# TODO 任务管理系统内置配置文件
# ==============================

server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"
  timezone: ""  # 空 / "Local" → 服务器本地时区;"UTC";IANA 名(Asia/Shanghai);固定偏移(+08:00)

database:
  path: "./data/tasks.db"

static_files: true

reminder:
  enabled: true
  scan_interval_seconds: 30
  webhook_timeout_seconds: 10
  max_retries: 3
  retry_delay_seconds: 5
  worker_count: 5
  grace_period_minutes: 10
  webhook_body_template: |
    {"msg_type":"text","content":{"text":"[TODO] {{.Title}}\n优先级: {{.PriorityText}}\n截止: {{.DueAt}}"}}
  default_templates:
    feishu:
      channel_type: "webhook"
      webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/xxxxxxxx"
      webhook_method: "POST"
      webhook_headers:
        Content-Type: application/json; charset=utf-8
      webhook_body_template: |
        {"msg_type":"text","content":{"text":"[TODO] {{.Title}}\n优先级: {{.PriorityText}}\n截止: {{.DueAt}}"}}
    dingtalk:
      channel_type: "webhook"
      webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=xxxxxx"
      webhook_method: "POST"
      webhook_headers:
        Content-Type: application/json
      webhook_body_template: |
        {"msgtype":"text","text":{"content":"[TODO] {{.Title}}\n优先级: {{.PriorityText}}\n截止: {{.DueAt}}"},"at":{"isAtAll":false}}
    wecom:
      channel_type: "webhook"
      webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxxxxx"
      webhook_method: "POST"
      webhook_headers:
        Content-Type: application/json
      webhook_body_template: |
        {"msgtype":"text","text":{"content":"[TODO提醒] {{.Title}}\n优先级: {{.PriorityText}}\n截止: {{.DueAt}}"}}
    gotify:
      channel_type: "webhook"
      webhook_url: "http://localhost:8008/message?token=<apptoken>"
      webhook_method: "POST"
      webhook_headers:
        Content-Type: application/json
      webhook_body_template: |
        {"title":"[TODO] {{.Title}}","message":"优先级: {{.PriorityText}}\n截止: {{.DueAt}}","priority":5}

cors:
  enabled: true
  allowed_origins:
    - "*"

logging:
  file_enabled: true
  path: "./logs"
  max_days: 7

email:
  enabled: false
  smtp_host: ""
  smtp_port: 587
  smtp_username: ""
  smtp_password: ""
  from_address: ""
  from_name: "TODO 任务管理系统"

rate_limit:
  enabled: false
  reqs_per_second: 10
  burst: 20
  auth_reqs_per_second: 2
  auth_burst: 5

admin:
  enabled: false
  # 初始管理员账号:首次启动时自动创建(用户名已存在则跳过);username/password 为空则不创建
  username: ""
  password: ""
  email: ""

# ==============================
# 国际化配置（错误消息本地化）
# ==============================
i18n:
  default_lang: zh-CN       # 默认语言: zh-CN(中文)、en(英文)

# ==============================
# OAuth 社交登录配置
# ==============================
oauth:
  enabled: false
  # frontend_url / admin_url / state_secret 由系统自动管理，无需手动配置
  github:
    enabled: false
    client_id: ""
    client_secret: ""
  google:
    enabled: false
    client_id: ""
    client_secret: ""
  linuxdo:
    enabled: false
    client_id: ""
    client_secret: ""
