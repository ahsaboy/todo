# ==============================
# TODO 任务管理系统配置文件
# ==============================

# 服务配置
server:
  host: "0.0.0.0"       # 监听地址，0.0.0.0 表示接受所有网卡连接
  port: 8080             # 监听端口，可通过 CLI --port 覆盖
  mode: "debug"          # Gin 模式：debug（开发）、release（生产）

# 数据库配置
database:
  path: "./data/tasks.db"  # SQLite 数据库文件路径

# API 认证配置
auth:
  api_key: "your-secure-api-key"  # 请求头 X-API-Key 的值，留空则不启用认证

# 提醒服务配置
reminder:
  enabled: true                    # 是否启用后台提醒扫描
  scan_interval_seconds: 30        # 扫描间隔（秒）
  webhook_url: "http://100.80.0.2:1821/run_task"  # 提醒推送的目标地址
  webhook_method: "POST"           # HTTP 请求方法
  webhook_headers:                 # 自定义请求头
    Content-Type: "application/json"
  # Webhook 请求体模板，支持 Go text/template 语法
  # 可用变量：
  #   {{.TaskID}}       - 任务 ID
  #   {{.Title}}        - 任务标题
  #   {{.Description}}  - 任务描述
  #   {{.Priority}}     - 优先级 (1=高, 2=中, 3=低)
  #   {{.PriorityText}} - 优先级文字 ("高"/"中"/"低")
  #   {{.DueAt}}        - 截止时间
  #   {{.RemindAt}}     - 提醒时间
  #   {{.RepeatType}}   - 重复类型
  #   {{.CreatedAt}}    - 创建时间
  #  {"msg_type":"text","content":{"text":"[TODO提醒] {{.Title}}\n优先级: {{.PriorityText}}\n截止: {{.DueAt}}"}}
  webhook_body_template: |
    {
      "name": "MCP Send Notification",
      "arguments": {
        "title": "[TODO提醒]",
        "content": "{{.Title}}\n优先级: {{.PriorityText}}\n截止: {{.DueAt}}"
      }
    }
  webhook_timeout_seconds: 10      # HTTP 请求超时（秒）
  max_retries: 3                   # 失败重试次数
  retry_delay_seconds: 5           # 重试间隔基数（秒），实际间隔会乘以重试次数

# CORS 跨域配置
cors:
  enabled: true              # 是否启用 CORS
  allowed_origins:           # 允许的来源域名
    - "*"

# 日志配置
logging:
  level: "debug"              # 日志级别：debug / info / warn / error
  format: "console"             # 输出格式：json（生产）/ console（开发）
