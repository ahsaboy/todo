# ==============================
# TODO 任务管理系统配置文件
# ==============================

# 服务配置
server:
  host: "0.0.0.0"       # 监听地址，0.0.0.0 表示接受所有网卡连接
  port: 8080             # 监听端口，可通过 CLI --port 覆盖
  mode: "release"          # Gin 模式：debug（开发）、release（生产）
  timezone: "Asia/Shanghai"  # 时间出参的目标时区。支持 IANA 名(Asia/Shanghai)或固定偏移(+08:00);空 / "Local" 表示服务器本地时区

# 数据库配置
database:
  path: "./data/tasks.db"  # SQLite 数据库文件路径

# 静态资源配置
static_files: true       # 是否启用前端静态文件与 Swagger 文档；为 false 时两者都会关闭

# 提醒服务配置
reminder:
  enabled: true                    # 是否启用后台提醒扫描
  scan_interval_seconds: 30        # 扫描间隔（秒）
  webhook_timeout_seconds: 10      # HTTP 请求超时（秒）
  max_retries: 3                   # 失败重试次数
  retry_delay_seconds: 5           # 重试间隔基数（秒），实际间隔会乘以重试次数
  webhook_body_template: |         # 用户渠道未自定义模板时使用的默认消息模板
    {"msg_type":"text","content":{"text":"[TODO] {{.Title}}\n优先级: {{.PriorityText}}\n截止: {{.DueAt}}"}}

  # 系统不再支持全局 webhook 目标地址。
  # 用户必须通过 /api/v1/user/reminder-configs 创建并启用自己的通知渠道。
  # 下面的 default_templates 仅作为创建渠道时的模板参考，不会直接被系统拿来发送。
  # 预置提醒模板（用户创建提醒配置时可参考）
  # GET /api/v1/templates 可查看所有预置模板
  # 模板变量：{{.TaskID}} {{.Title}} {{.Description}} {{.Priority}} {{.PriorityText}} {{.DueAt}} {{.RemindAt}} {{.RepeatType}} {{.CreatedAt}}
  default_templates:
    feishu:
      channel_type: "webhook"
      webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/xxxxxxxx"
      webhook_method: "POST"
      webhook_headers:
        Content-Type: application/json; charset=utf-8
      webhook_body_template: |
        {"msg_type":"text","content":{"text":"[TODO] {{.Title}}\n优先级: {{.PriorityText}}\n截止: {{.DueAt}}"}}
    dingtalk:
      channel_type: "webhook"
      webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=xxxxxx"
      webhook_method: "POST"
      webhook_headers:
        Content-Type: application/json
      webhook_body_template: |
        {"msgtype":"text","text":{"content":"[TODO] {{.Title}}\n优先级: {{.PriorityText}}\n截止: {{.DueAt}}"},"at":{"isAtAll":false}}
    wecom:
      channel_type: "webhook"
      webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxxxxx"
      webhook_method: "POST"
      webhook_headers:
        Content-Type: application/json
      webhook_body_template: |
        {"msgtype":"text","text":{"content":"[TODO提醒] {{.Title}}\n优先级: {{.PriorityText}}\n截止: {{.DueAt}}"}}
    gotify:
      channel_type: "webhook"
      webhook_url: "http://localhost:8008/message?token=<apptoken>"
      webhook_method: "POST"
      webhook_headers:
        Content-Type: application/json
      webhook_body_template: |
        {"title":"[TODO] {{.Title}}","message":"优先级: {{.PriorityText}}\n截止: {{.DueAt}}","priority":5}
    mcp:
      channel_type: "webhook"
      webhook_url: "https://example.com/mcp-webhook"
      webhook_method: "POST"
      webhook_headers:
        Content-Type: application/json
      webhook_body_template: |
        {"name":"MCP Send Notification","arguments":{"title":"[TODO提醒]","content":"{{.Title}}\n优先级: {{.PriorityText}}\n截止: {{.DueAt}}"}}


# CORS 跨域配置
cors:
  enabled: true              # 是否启用 CORS
  allowed_origins:           # 允许的来源域名
    - "*"

# 日志配置
logging:
  file_enabled: true          # 是否同时写入日志文件；终端输出始终开启
  path: "./logs"              # 日志存储目录
  max_days: 7                 # 日志保留天数
