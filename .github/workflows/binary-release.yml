name: Binary Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      APP: todo
      LDFLAGS: -s -w
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Typecheck frontend
        run: |
          cd frontend
          npx vue-tsc --noEmit

      - name: Build frontend
        run: |
          cd frontend
          npm run build
          cp -r dist ../web/

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.25

      - name: Install swag
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate swagger docs
        run: |
          swag init -g cmd/server/main.go -o docs --parseDependency --parseInternal
          sed -i '/LeftDelim:/d; /RightDelim:/d' docs/docs.go

      - name: Vet Go code
        run: go vet ./...

      - name: Run Go tests
        run: go test -v ./...

      - name: Install UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl

      - name: Generate swagger docs
        run: |
          swag init -g cmd/server/main.go -o docs --parseDependency --parseInternal
          sed -i '/LeftDelim:/d; /RightDelim:/d' docs/docs.go

      - name: Build release binaries
        run: |
          mkdir -p artifacts
          for target in linux/amd64 linux/arm64 windows/amd64 darwin/arm64 android/arm64; do
            os=${target%/*}
            arch=${target#*/}
            ext=""
            if [ "$os" = "windows" ]; then
              ext=".exe"
            fi
            out="artifacts/${APP}-${os}-${arch}${ext}"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -ldflags "$LDFLAGS" -o "$out" ./cmd/server
            if [ "$os" != "darwin" ]; then
              upx --best --lzma "$out"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
