name: Binary Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-assets:
    runs-on: ubuntu-latest
    env:
      APP: todo
      LDFLAGS: -s -w
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.25

      - name: Install swag
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest

      - name: Install UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl

      - name: Generate swagger docs
        run: |
          swag init -g cmd/server/main.go -o docs --parseDependency --parseInternal
          sed -i '/LeftDelim:/d; /RightDelim:/d' docs/docs.go

      - name: Build release binaries
        run: |
          mkdir -p artifacts
          for target in linux/amd64 linux/arm64 windows/amd64 darwin/arm64 android/arm64; do
            os=${target%/*}
            arch=${target#*/}
            ext=""
            out="artifacts/${APP}-${os}-${arch}"
            if [ "$os" = "windows" ]; then
              ext=".exe"
              out="artifacts/${APP}-${os}-${arch}.exe"
            fi
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build $LDFLAGS -o "$out$ext" ./cmd/server
            upx --best --lzma "$out$ext"
          done

      - name: Package release assets
        run: |
          mkdir -p release-artifacts
          zip -j release-artifacts/${APP}-${{ github.event.release.tag_name }}-binaries.zip artifacts/*

      - name: Upload release asset
        uses: actions/upload-release-asset@v2
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: release-artifacts/${APP}-${{ github.event.release.tag_name }}-binaries.zip
          asset_name: ${APP}-${{ github.event.release.tag_name }}-binaries.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
