<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ddc84"/>
      <stop offset="100%" stop-color="#28a745"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#e8a020"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1428"/>
      <stop offset="100%" stop-color="#0b0b0f"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="200" height="200" rx="44" fill="url(#bgGlow)"/>

  <!-- 外轨道虚线 -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#ffffff06" stroke-width="1" stroke-dasharray="4 8"/>

  <!-- 金色弧线 -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#gold)" stroke-width="2.5"
    stroke-linecap="round" stroke-dasharray="60 495" opacity="0.5"
    transform="rotate(120 100 100)"/>

  <!-- 轨道粒子 -->
  <circle cx="178" cy="58" r="3.5" fill="#f0c040" opacity="0.6"/>

  <!-- checkbox 方框 -->
  <rect x="48" y="48" width="104" height="104" rx="26" fill="#ffffff05" stroke="#ffffff12" stroke-width="2"/>

  <!-- 打勾 -->
  <path d="M70 100 L90 120 L132 76" stroke="url(#green)" stroke-width="7"
    stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- 角落光点 -->
  <circle cx="148" cy="60" r="2" fill="#3ddc84" opacity="0.5"/>
  <circle cx="52" cy="80" r="1.5" fill="#f0c040" opacity="0.35"/>
</svg>
