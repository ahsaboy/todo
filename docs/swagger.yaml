basePath: /
definitions:
  todo_internal_models.APIKeyInfo:
    properties:
      created_at:
        type: string
      id:
        type: integer
      last_used_at:
        type: string
      name:
        type: string
    type: object
  todo_internal_models.APIKeyPlainResponse:
    properties:
      api_key:
        type: string
      key:
        description: 兼容旧前端字段名
        type: string
    type: object
  todo_internal_models.ChangePasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  todo_internal_models.CreateKeyRequest:
    properties:
      name:
        maxLength: 64
        type: string
    type: object
  todo_internal_models.CreateReminderConfigRequest:
    properties:
      channel_type:
        enum:
        - webhook
        - feishu
        - dingtalk
        - wecom
        - slack
        type: string
      enabled:
        type: boolean
      max_retries:
        maximum: 10
        minimum: 0
        type: integer
      name:
        maxLength: 64
        type: string
      retry_delay_seconds:
        maximum: 300
        minimum: 1
        type: integer
      webhook_body_template:
        type: string
      webhook_headers:
        additionalProperties:
          type: string
        type: object
      webhook_method:
        enum:
        - GET
        - POST
        - PUT
        type: string
      webhook_url:
        type: string
    required:
    - channel_type
    - name
    - webhook_url
    type: object
  todo_internal_models.CreateTaskRequest:
    properties:
      description:
        maxLength: 1000
        type: string
      due_at:
        type: string
      priority:
        enum:
        - 1
        - 2
        - 3
        type: integer
      remind_at:
        type: string
      repeat_end_date:
        type: string
      repeat_interval:
        maximum: 365
        minimum: 1
        type: integer
      repeat_type:
        enum:
        - none
        - daily
        - weekly
        - monthly
        - yearly
        type: string
      title:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - title
    type: object
  todo_internal_models.LoginRequest:
    properties:
      account:
        type: string
      password:
        type: string
    required:
    - account
    - password
    type: object
  todo_internal_models.RegisterRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 72
        minLength: 6
        type: string
      username:
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  todo_internal_models.Task:
    properties:
      completed:
        type: boolean
      created_at:
        type: string
      description:
        type: string
      due_at:
        type: string
      id:
        type: integer
      priority:
        type: integer
      remind_at:
        type: string
      reminder_sent:
        type: boolean
      reminder_sent_at:
        type: string
      repeat_end_date:
        type: string
      repeat_interval:
        type: integer
      repeat_type:
        type: string
      title:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  todo_internal_models.UpdateProfileRequest:
    properties:
      email:
        type: string
    type: object
  todo_internal_models.UpdateReminderConfigRequest:
    properties:
      channel_type:
        enum:
        - webhook
        - feishu
        - dingtalk
        - wecom
        - slack
        type: string
      enabled:
        type: boolean
      max_retries:
        maximum: 10
        minimum: 0
        type: integer
      name:
        maxLength: 64
        type: string
      retry_delay_seconds:
        maximum: 300
        minimum: 1
        type: integer
      webhook_body_template:
        type: string
      webhook_headers:
        additionalProperties:
          type: string
        type: object
      webhook_method:
        enum:
        - GET
        - POST
        - PUT
        type: string
      webhook_url:
        type: string
    type: object
  todo_internal_models.UpdateTaskRequest:
    properties:
      description:
        maxLength: 1000
        type: string
      due_at:
        type: string
      priority:
        enum:
        - 1
        - 2
        - 3
        type: integer
      remind_at:
        type: string
      repeat_end_date:
        type: string
      repeat_interval:
        maximum: 365
        minimum: 1
        type: integer
      repeat_type:
        enum:
        - none
        - daily
        - weekly
        - monthly
        - yearly
        type: string
      title:
        maxLength: 255
        minLength: 1
        type: string
    type: object
  todo_internal_models.UserReminderConfig:
    properties:
      channel_type:
        type: string
      created_at:
        type: string
      enabled:
        type: boolean
      id:
        type: integer
      max_retries:
        type: integer
      name:
        type: string
      retry_delay_seconds:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
      webhook_body_template:
        type: string
      webhook_headers:
        additionalProperties:
          type: string
        type: object
      webhook_method:
        type: string
      webhook_url:
        type: string
    type: object
  todo_internal_models.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      username:
        type: string
    type: object
  todo_internal_utils.ErrorResponse:
    properties:
      code:
        example: NOT_FOUND
        type: string
      error:
        example: task not found
        type: string
      success:
        example: false
        type: boolean
    type: object
  todo_internal_utils.PageMeta:
    properties:
      limit:
        example: 20
        type: integer
      page:
        example: 1
        type: integer
      total_items:
        example: 100
        type: integer
      total_pages:
        example: 5
        type: integer
    type: object
  todo_internal_utils.PaginatedResponse:
    properties:
      data: {}
      meta:
        $ref: '#/definitions/todo_internal_utils.PageMeta'
      success:
        example: true
        type: boolean
    type: object
  todo_internal_utils.SuccessResponse:
    properties:
      data: {}
      success:
        example: true
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: 多用户 TODO 任务管理系统，支持用户注册/登录、个人 API Key、多渠道提醒推送
  title: TODO 任务管理系统 API
  version: 2.0.0
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 验证用户名或邮箱密码并返回新的 API Key
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/todo_internal_models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/todo_internal_utils.SuccessResponse'
            - properties:
                data:
                  properties:
                    ' api_key':
                      type: string
                    user:
                      $ref: '#/definitions/todo_internal_models.UserResponse'
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      summary: 用户登录
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: 创建新用户并返回 API Key
      parameters:
      - description: 注册信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/todo_internal_models.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/todo_internal_utils.SuccessResponse'
            - properties:
                data:
                  properties:
                    ' api_key':
                      type: string
                    user:
                      $ref: '#/definitions/todo_internal_models.UserResponse'
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      summary: 用户注册
      tags:
      - auth
  /api/v1/health:
    get:
      description: 检查服务和数据库连接状态，用于 Docker 健康检查和负载均衡探测
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties: true
            type: object
      summary: 健康检查
      tags:
      - health
  /api/v1/tasks:
    get:
      description: 支持分页查询、按状态/优先级筛选、按关键字搜索、自定义排序
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: limit
        type: integer
      - default: created_at
        description: 排序字段
        enum:
        - created_at
        - updated_at
        - due_at
        - priority
        in: query
        name: sort
        type: string
      - default: desc
        description: 排序方向
        enum:
        - asc
        - desc
        in: query
        name: order
        type: string
      - description: 任务状态
        enum:
        - pending
        - completed
        - all
        in: query
        name: status
        type: string
      - description: 优先级筛选
        enum:
        - 1
        - 2
        - 3
        in: query
        name: priority
        type: integer
      - description: 截止时间上限 (2006-01-02 15:04:05)
        in: query
        name: due_before
        type: string
      - description: 截止时间下限 (2006-01-02 15:04:05)
        in: query
        name: due_after
        type: string
      - description: 搜索关键字（标题/描述）
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/todo_internal_utils.PaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/todo_internal_models.Task'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 获取任务列表（分页、筛选、排序）
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: 创建一个新任务，支持设置标题、优先级、截止时间、提醒时间、重复规则等；若设置了提醒时间（remind_at），则必须至少存在一个已启用的通知渠道
      parameters:
      - description: 任务信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/todo_internal_models.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/todo_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/todo_internal_models.Task'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 创建一个新任务
      tags:
      - tasks
  /api/v1/tasks/{id}:
    delete:
      description: 根据任务 ID 永久删除一个任务
      parameters:
      - description: 任务 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 删除指定任务
      tags:
      - tasks
    get:
      description: 根据任务 ID 返回任务详情
      parameters:
      - description: 任务 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/todo_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/todo_internal_models.Task'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 根据 ID 获取任务
      tags:
      - tasks
    put:
      consumes:
      - application/json
      description: 部分更新任务字段，只需传入需要修改的字段
      parameters:
      - description: 任务 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 要更新的字段
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/todo_internal_models.UpdateTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/todo_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/todo_internal_models.Task'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 更新任务信息
      tags:
      - tasks
  /api/v1/tasks/{id}/complete:
    patch:
      description: 将任务在已完成和未完成之间切换。如果是重复任务且标记为完成，会自动创建下一次任务
      parameters:
      - description: 任务 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/todo_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/todo_internal_models.Task'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 切换任务的完成/未完成状态
      tags:
      - tasks
  /api/v1/templates:
    get:
      description: 返回 config.yaml 中 reminder.default_templates 配置的预置模板；模板只作为创建用户通知渠道时的参考，不会直接用于发送
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 查看预置提醒模板
      tags:
      - templates
  /api/v1/user/keys:
    get:
      description: 获取当前用户的所有 API Key
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/todo_internal_utils.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/todo_internal_models.APIKeyInfo'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 列出所有 API Keys
      tags:
      - user
    post:
      consumes:
      - application/json
      description: 为当前用户生成一个新的 API Key
      parameters:
      - description: Key 信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/todo_internal_models.CreateKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/todo_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/todo_internal_models.APIKeyPlainResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 生成新 API Key
      tags:
      - user
  /api/v1/user/keys/{id}:
    delete:
      description: 删除指定的 API Key
      parameters:
      - description: API Key ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 撤销 API Key
      tags:
      - user
  /api/v1/user/password:
    put:
      consumes:
      - application/json
      description: 验证旧密码后设置新密码
      parameters:
      - description: 密码信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/todo_internal_models.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 修改密码
      tags:
      - user
  /api/v1/user/profile:
    get:
      description: 获取当前登录用户的个人信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/todo_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/todo_internal_models.UserResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 获取用户信息
      tags:
      - user
    put:
      consumes:
      - application/json
      description: 更新当前用户的邮箱等信息
      parameters:
      - description: 要更新的信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/todo_internal_models.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/todo_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/todo_internal_models.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 更新用户信息
      tags:
      - user
  /api/v1/user/reminder-configs:
    get:
      description: 获取当前用户的所有通知渠道配置
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/todo_internal_utils.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/todo_internal_models.UserReminderConfig'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 列出提醒配置
      tags:
      - reminder-config
    post:
      consumes:
      - application/json
      description: 为当前用户创建一个新的通知渠道配置
      parameters:
      - description: 配置信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/todo_internal_models.CreateReminderConfigRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/todo_internal_utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/todo_internal_models.UserReminderConfig'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 创建提醒配置
      tags:
      - reminder-config
  /api/v1/user/reminder-configs/{id}:
    delete:
      parameters:
      - description: 配置 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/todo_internal_utils.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: 删除提醒配置
      tags:
      - reminder-config
    get:
      parameters:
      - description: 配置 ID
        in: path
        name: id
        required: true
        type: integer
